name: travel_planner_app
description: "App de gestión de viajes inteligente - TFG"
publish_to: 'none' # Evita que se publique en pub.dev accidentalmente
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Gestión de Estado y DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.9
  google_sign_in: ^6.2.1

  # Utilidades
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  image_picker: ^1.2.1
  cached_network_image: ^3.4.0
  share_plus: ^10.0.0
  flutter_cache_manager: ^3.4.1
  file_picker: ^8.0.7
  url_launcher: ^6.3.2
  flutter_map_location_marker: ^9.0.0
  geolocator: ^12.0.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Generadores de código (Esenciales para Riverpod y Freezed)
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env