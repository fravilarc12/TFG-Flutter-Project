experiments:
  configs:
    experiment_name: default_experiment
    description: Default configuration for experiments
    parameters:
      learning_rate: 0.001
      batch_size: 32
      num_epochs: 100
      model:
        type: neural_network
        layers:
          - type: dense
            units: 128
            activation: relu
          - type: dense
            units: 64
            activation: relu
          - type: output
            units: 10
            activation: softmax
      data:
        train_data_path: ../data/processed/train.csv
        validation_data_path: ../data/processed/val.csv
        test_data_path: ../data/processed/test.csv
      logging:
        log_dir: ../logs
        log_level: info
      save:
        model_dir: ../models
        save_best_only: true